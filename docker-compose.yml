version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: snack-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: snack_referral
    ports: ['3306:3306']
    volumes:
      - ./server/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: snack-redis
    restart: always
    ports: ['6379:6379']

  api:
    build: ./server
    container_name: snack-api
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./server/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: snack_referral
      DB_USER: root
      DB_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    ports: ['3000:3000']

volumes:
  mysql_data:
