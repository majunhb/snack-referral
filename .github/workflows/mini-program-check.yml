# ============================================================
# Mini Program Code Quality Check
# Trigger: push/PR 涉及小程序文件时
# 检查：JS 语法、JSON 合法性、文件结构完整性
# ============================================================
name: Mini Program Check

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram-user/**'
      - 'miniprogram-merchant/**'
  pull_request:
    branches: [main]
    paths:
      - 'miniprogram-user/**'
      - 'miniprogram-merchant/**'
  workflow_dispatch:

jobs:
  check:
    name: Mini Program Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        app: [miniprogram-user, miniprogram-merchant]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Validate JSON files
        run: |
          echo "=== Checking ${{ matrix.app }} JSON files ==="
          find ${{ matrix.app }} -name '*.json' -print0 | while IFS= read -r -d '' f; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "  OK  $f"
          done

      - name: Validate JS syntax
        run: |
          echo "=== Checking ${{ matrix.app }} JS syntax ==="
          find ${{ matrix.app }} -name '*.js' -print0 | while IFS= read -r -d '' f; do
            node --check "$f" && echo "  OK  $f"
          done

      - name: Check page structure
        run: |
          echo "=== Checking ${{ matrix.app }} page completeness ==="
          PAGES=$(node -e "const p=require('./${{ matrix.app }}/app.json'); p.pages.forEach(x=>console.log(x))")
          MISSING=0
          for page in $PAGES; do
            for ext in js json wxml wxss; do
              if [ ! -f "${{ matrix.app }}/$page.$ext" ]; then
                echo "  MISSING: $page.$ext"
                MISSING=$((MISSING + 1))
              fi
            done
          done
          if [ $MISSING -gt 0 ]; then
            echo "WARNING: $MISSING missing page files"
          else
            echo "  All pages complete"
          fi
